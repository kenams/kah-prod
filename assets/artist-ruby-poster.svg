      <stop offset="38%" stop-color="#d8b56a" />
      <stop offset="72%" stop-color="#fff1dc" />
      <stop offset="100%" stop-color="#8b6930" />
    </linearGradient>
    <linearGradient id="ruby" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8eb1" />
      <stop offset="50%" stop-color="#dd255e" />
      <stop offset="100%" stop-color="#7b1237" />
