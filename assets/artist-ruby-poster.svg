      <stop offset="45%" stop-color="#1b1118" />
      <stop offset="100%" stop-color="#060608" />
    </linearGradient>
    <radialGradient id="glow-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 260) rotate(36) scale(300 360)">
      <stop offset="0%" stop-color="#ff7da7" stop-opacity="0.72" />
      <stop offset="100%" stop-color="#ff7da7" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(650 520) rotate(24) scale(260 320)">
      <stop offset="0%" stop-color="#d8b56a" stop-opacity="0.26" />
